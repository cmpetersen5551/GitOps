apiVersion: helm.toolkit.fluxcd.io/v2
kind: HelmRelease
metadata:
  name: kadalu-operator
  namespace: flux-system
spec:
  interval: 1h
  releaseName: kadalu-operator
  targetNamespace: kadalu
  storageNamespace: kadalu
  chart:
    spec:
      chart: kadalu-helm-chart
      sourceRef:
        kind: HelmRepository
        name: kadalu
        namespace: flux-system
      version: "1.3.0"
  install:
    crds: Create
  upgrade:
    crds: CreateReplace